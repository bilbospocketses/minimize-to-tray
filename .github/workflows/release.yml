name: Release

on:
  push:
    tags: ['v*']

jobs:
  build-and-release:
    runs-on: windows-2025  # explicit pin, not the windows-latest moving alias. GitHub's Jun-2026 migration swaps VS2022->VS2026 under this same label (label stays); build is VS-agnostic (setup-dotnet + vendored Ahk2Exe), so transparent.
    permissions:
      contents: write
      id-token: write
      attestations: write
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - uses: actions/setup-dotnet@26b0ec14cb23fa6904739307f278c14f94c95bf1 # v5.4.0
        with:
          dotnet-version: 10.x

      - name: Restore dotnet local tools (vpk)
        run: dotnet tool restore

      - name: Build via build.ps1
        shell: pwsh
        run: ./build.ps1

      - name: Generate SHA256SUMS
        shell: pwsh
        run: |
          $hashes = Get-ChildItem dist/ -File | ForEach-Object {
            "$((Get-FileHash $_.FullName -Algorithm SHA256).Hash.ToLower())  $($_.Name)"
          }
          $hashes | Set-Content dist/SHA256SUMS
          Get-Content dist/SHA256SUMS

      - name: Attest build provenance
        uses: actions/attest-build-provenance@0f67c3f4856b2e3261c31976d6725780e5e4c373 # v4.1.1
        with:
          subject-path: |
            dist/minimize-to-tray-win-Setup.exe
            dist/minimize-to-tray-win-Portable.zip

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@718ea10b132b3b2eba29c1007bb80653f286566b # v3.0.1
        with:
          body: |
            See [CHANGELOG.md](https://github.com/bilbospocketses/minimize-to-tray/blob/main/CHANGELOG.md) for full details.
          files: |
            dist/minimize-to-tray-win-Setup.exe
            dist/minimize-to-tray-win-Portable.zip
            dist/minimize-to-tray-*-full.nupkg
            dist/RELEASES
            dist/releases.win.json
            dist/assets.win.json
            dist/SHA256SUMS
