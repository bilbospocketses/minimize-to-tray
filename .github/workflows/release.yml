name: Release

on:
  push:
    tags: ['v*']

jobs:
  build-and-release:
    runs-on: windows-2025  # pinned (was windows-latest, which GitHub is migrating to win-2025 by 2026-06-15)
    permissions:
      contents: write
      id-token: write
      attestations: write
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - uses: actions/setup-dotnet@9a946fdbd5fb07b82b2f5a4466058b876ab72bb2 # v5.3.0
        with:
          dotnet-version: 10.x

      - name: Restore dotnet local tools (vpk)
        run: dotnet tool restore

      - name: Build via build.ps1
        shell: pwsh
        run: ./build.ps1

      - name: Generate SHA256SUMS
        shell: pwsh
        run: |
          $hashes = Get-ChildItem dist/ -File | ForEach-Object {
            "$((Get-FileHash $_.FullName -Algorithm SHA256).Hash.ToLower())  $($_.Name)"
          }
          $hashes | Set-Content dist/SHA256SUMS
          Get-Content dist/SHA256SUMS

      - name: Attest build provenance
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32 # v4.1.0
        with:
          subject-path: |
            dist/minimize-to-tray-win-Setup.exe
            dist/minimize-to-tray-win-Portable.zip

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v3.0.0
        with:
          body: |
            See [CHANGELOG.md](https://github.com/bilbospocketses/minimize-to-tray/blob/main/CHANGELOG.md) for full details.
          files: |
            dist/minimize-to-tray-win-Setup.exe
            dist/minimize-to-tray-win-Portable.zip
            dist/minimize-to-tray-*-full.nupkg
            dist/RELEASES
            dist/releases.win.json
            dist/assets.win.json
            dist/SHA256SUMS
