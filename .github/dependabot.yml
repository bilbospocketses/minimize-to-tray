# Dependabot version updates for minimize-to-tray.
#
# Security updates are handled separately by Dependabot security alerts
# (enabled via repo Settings -> Code security and analysis). This file covers
# routine non-security version bumps.
#
# Two ecosystems wired:
#   - nuget: covers updater-helper/UpdaterHelper.csproj (Velopack SDK and
#     transitive .NET runtime packages). Dependabot auto-discovers csproj
#     files under the root.
#   - github-actions: maintains SHA-pinned action refs in
#     .github/workflows/*.yml. Upstream actions tag new versions periodically;
#     without this Dependabot would never bump our pins and we'd drift on
#     security fixes shipped in the actions themselves.
#
# Weekly cadence keeps PR noise manageable for a solo-owned repo.

version: 2
updates:
  - package-ecosystem: nuget
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    # Batch all minor + patch NuGet bumps into ONE weekly PR (majors open
    # individually for review). Keeps routine bumps low-noise and consistent
    # with the sibling repos.
    groups:
      nuget-minor-patch:
        patterns:
          - "*"
        update-types:
          - "minor"
          - "patch"

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    open-pull-requests-limit: 5
    # Batch all action bumps into one PR — keeps the codeql-action init/analyze/
    # upload-sarif refs in lockstep (a split bump mismatches CodeQL versions) and
    # avoids weekly action-PR pile-ups.
    groups:
      actions:
        patterns:
          - "*"
